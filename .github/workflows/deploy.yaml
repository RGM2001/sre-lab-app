name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-push-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: 📥 Скачиваем код приложения
        uses: actions/checkout@v4

      - name: 🔑 Авторизуемся в хранилище (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 📦 Собираем и пушим Docker-образ
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # ЖЕСТКО ЗАДАЕМ ИМЯ МАЛЕНЬКИМИ БУКВАМИ:
          tags: ghcr.io/rgm2001/sre-lab-app:${{ github.sha }}

      - name: 🔄 Скачиваем GitOps репозиторий инфры
        uses: actions/checkout@v4
        with:
          repository: RGM2001/sre_lab_manifest
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops-repo

      - name: ✍️ Обновляем версию в кластере
        run: |
          cd gitops-repo/overlays/dev
          # ИЩЕМ И МЕНЯЕМ НА НАШ ОБРАЗ (ТОЖЕ МАЛЕНЬКИМИ БУКВАМИ):
          sed -i "s|image: .*|image: ghcr.io/rgm2001/sre-lab-app:${{ github.sha }}|g" *.yaml
          
          git config user.name "SRE CI/CD Bot"
          git config user.email "bot@srelab.local"
          git add .
          git commit -m "auto-deploy: выкатили коммит ${{ github.sha }}"
          git pushname: CI/CD Pipeline

